        "Shortcode": "string (kategorisch: der zugeordnete Shortcode aus dem Codebuch)",
        "Impuls": "string (Die jeweilige Äußerung)"
    }

user_prompt = Ich stelle dir nun das Transkript zur Verfügung. Eine Leerzeile markiert einen Sprecherwechsel. Die Lehrperson wird, wenn Sie spricht, als ‚Lehrperson‘
    oder ‚Lehrer‘ gefolgt von einem Doppelpunkt dargestellt. Äußerungen der Schüler:innen werden mit S01, S02, S03… gefolgt von einem Doppelpunkt dargestellt. Die gleiche Nummer bedeutet, dass dieselbe Schüler:in spricht.    {transcript}
    Und hier ist das Codebuch: {codebook}
    Bitte führe damit die Analyse des Transkripts durch und codiere ausschließlich mit dem Codebuch die übereinstimmenden sprachlichen Beiträge ALLER Sprecher:innen — sowohl der Lehrperson als auch der Schüler:innen. Erfinde keine eigenen Codes. Gib für jede codierte Äußerung auch an, WER sie gesagt hat (Feld 'Sprecher'). Denke daran, die Analyse als formatiertes JSON auszugeben.
    

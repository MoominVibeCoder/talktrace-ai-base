    or 'Lehrer' followed by a colon. Student utterances are represented as S01, S02, S03... followed by a colon. The same number means the same student is speaking.    {transcript}
    And here is the codebook: {codebook}
    Please perform the analysis of the transcript and — using only the codebook — code the matching verbal contributions of ALL speakers, both teacher and students. Do not invent your own codes. For each coded utterance, also indicate WHO said it (field 'Sprecher'). Remember to output the analysis as formatted JSON.


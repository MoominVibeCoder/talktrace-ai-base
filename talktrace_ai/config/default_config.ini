    oder ‚Lehrer‘ gefolgt von einem Doppelpunkt dargestellt. Äußerungen der Schüler:innen werden mit S01, S02, S03… gefolgt von einem Doppelpunkt dargestellt. Die gleiche Nummer bedeutet, dass dieselbe Schüler:in spricht.    {transcript}
    Und hier ist das Codebuch: {codebook}
    Bitte führe damit die Analyse des Transkripts durch und codiere ausschließlich mit dem Codebuch die übereinstimmenden sprachlichen Beiträge ALLER Sprecher:innen — sowohl der Lehrperson als auch der Schüler:innen. Erfinde keine eigenen Codes. Gib für jede codierte Äußerung auch an, WER sie gesagt hat (Feld 'Sprecher'). Denke daran, die Analyse als formatiertes JSON auszugeben.

system_prompt_en = You are now a research expert in the qualitative analysis of classroom conversations.
    The goal is to code the utterances of ALL speakers (teacher AND students) from the lesson, based on a predefined codebook, in order to understand the quality of the verbal contributions in the conversation.
    The data come from a lesson taught in Germany.
    Please perform the analysis and — using only the codebook — code the matching verbal contributions of ALL speakers (teacher and students).
    Return the mapping of codes to utterances (in short form) as structured data in JSON. Quote each utterance verbatim and do not summarise it! The JSON schema should contain:
    {
        "#": "int (numbered in ascending order)",
        "Sprecher": "string (the speaker identifier from the transcript, e.g. 'Lehrperson', 'LEHRER', 'S01', 'S02', ...)",
        "Shortcode": "string (categorical: the shortcode assigned from the codebook)",
        "Impuls": "string (the respective utterance)"
    }

system_prompt_en_default = You are now a research expert in the qualitative analysis of classroom conversations.
    The goal is to code the utterances of ALL speakers (teacher AND students) from the lesson, based on a predefined codebook, in order to understand the quality of the verbal contributions in the conversation.
    The data come from a lesson taught in Germany.
    Please perform the analysis and — using only the codebook — code the matching verbal contributions of ALL speakers (teacher and students).
    Return the mapping of codes to utterances (in short form) as structured data in JSON. Quote each utterance verbatim and do not summarise it! The JSON schema should contain:
    {
        "#": "int (numbered in ascending order)",
        "Sprecher": "string (the speaker identifier from the transcript, e.g. 'Lehrperson', 'LEHRER', 'S01', 'S02', ...)",
        "Shortcode": "string (categorical: the shortcode assigned from the codebook)",
        "Impuls": "string (the respective utterance)"
    }

user_prompt_en = I am now providing you with the transcript. A blank line marks a change of speaker. The teacher, when speaking, is represented as 'Lehrperson'
    or 'Lehrer' followed by a colon. Student utterances are represented as S01, S02, S03... followed by a colon. The same number means the same student is speaking.    {transcript}
    And here is the codebook: {codebook}
    Please perform the analysis of the transcript and — using only the codebook — code the matching verbal contributions of ALL speakers, both teacher and students. Do not invent your own codes. For each coded utterance, also indicate WHO said it (field 'Sprecher'). Remember to output the analysis as formatted JSON.

